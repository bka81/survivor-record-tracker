<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Transfer Event</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body class="min-h-screen font-sans" style="color: var(--color-text); background: linear-gradient(180deg, var(--color-bg-950), var(--color-bg-900));">

    <div class="flex justify-between items-center p-6 border-b border-[var(--color-border)]">
        <div>
            <h1 class="font-mono uppercase tracking-widest text-2xl font-bold">Create Transfer Event</h1>
            <p class="text-[var(--color-muted)] mt-1">Responder / Facility Staff Transfer Form</p>
        </div>
        <a href="{{ url_for('staff_dashboard') }}" class="px-4 py-2 bg-[var(--color-cyber)] text-black rounded-lg hover:brightness-110 transition-all inline-block">
            ← Back to Dashboard
        </a>
    </div>

    <div class="p-6">
        <div class="max-w-3xl mx-auto bg-[var(--color-surface)] rounded-lg p-6 shadow-lg">
            <h2 class="font-mono uppercase tracking-widest text-xl font-bold mb-6 text-[var(--color-matrix)]">New Transfer Entry</h2>
            {% if error %}
            <div class="bg-[var(--color-danger)]/20 border border-[var(--color-danger)] text-[var(--color-danger)] px-4 py-2 rounded-lg mb-4 text-sm">
                {{ error }}
            </div>
            {% endif %}
            <form method="POST" action="{{ url_for('add_transfer') }}" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-[var(--color-muted)] mb-2">Survivor:</label>
                    <select name="survivorID" required
                            class="w-full px-3 py-2 bg-[var(--color-bg-900)] border border-[var(--color-border)] rounded-lg focus:outline-none focus:border-[var(--color-cyber)]">
                        {% for survivor in survivors %}
                        <option value="{{ survivor.survivorID }}">
                            {{ survivor.survivorID }} -
                            {% if survivor.firstName or survivor.lastName %}
                                {{ survivor.firstName or '' }} {{ survivor.lastName or '' }}
                            {% else %}
                                Unidentified
                            {% endif %}
                            {% if survivor.aliasTag %}
                                ({{ survivor.aliasTag }})
                            {% endif %}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-[var(--color-muted)] mb-2">From Facility:</label>
                        <select name="fromFacilityID"
                                class="w-full px-3 py-2 bg-[var(--color-bg-900)] border border-[var(--color-border)] rounded-lg focus:outline-none focus:border-[var(--color-cyber)]">
                            <option value="">None</option>
                            {% for facility in facilities %}
                            <option value="{{ facility.facilityID }}">{{ facility.facilityName }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-[var(--color-muted)] mb-2">To Facility:</label>
                        <select name="toFacilityID" required
                                class="w-full px-3 py-2 bg-[var(--color-bg-900)] border border-[var(--color-border)] rounded-lg focus:outline-none focus:border-[var(--color-cyber)]">
                            {% for facility in facilities %}
                            <option value="{{ facility.facilityID }}">{{ facility.facilityName }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-[var(--color-muted)] mb-2">Transfer Note:</label>
                    <textarea name="noteText" rows="4"
                              class="w-full px-3 py-2 bg-[var(--color-bg-900)] border border-[var(--color-border)] rounded-lg focus:outline-none focus:border-[var(--color-cyber)]"></textarea>
                </div>

                <div class="pt-2">
                    <button type="submit" class="px-6 py-2 bg-[var(--color-cyber)] text-black font-semibold rounded-lg hover:brightness-110 transition-all">
                        Create Transfer Event
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
