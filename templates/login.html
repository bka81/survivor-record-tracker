{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="max-w-md w-full bg-[var(--color-surface)] rounded-2xl border border-[var(--color-border)] p-8 shadow-[0_0_24px_rgba(0,255,65,0.08)]">

    <div class="flex items-center justify-center  mb-6 mr-2">
      <img src="{{ url_for('static', filename='assets/survivor_record_logo.png') }}"
           alt="Shield logo"
           class="w-20 h-20 object-contain">
      <h1 class="justfiy-left text-3xl -tracking-[0.02rem] font-mono text-[var(--color-matrix)]">
        Chain Of Care
      </h1>
    </div>

    {% if error %}
    <div class="bg-[var(--color-danger)]/20 border border-[var(--color-danger)] text-[var(--color-danger)] px-4 py-2 rounded-lg mb-4 text-sm">
      {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div class="bg-[var(--color-success)]/20 border border-[var(--color-success)] text-[var(--color-success)] px-4 py-2 rounded-lg mb-4 text-sm">
      {{ success }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-[var(--color-muted)] mb-2">Email Address</label>
        <input type="email" name="username" placeholder="Email address" required
               class="w-full px-3 py-2 bg-[var(--color-bg-900)] border border-[var(--color-border)] rounded-lg focus:outline-none focus:border-[var(--color-cyber)]">
      </div>

      <div>
        <label class="block text-sm font-medium text-[var(--color-muted)] mb-2">Password</label>
        <input type="password" name="password" placeholder="Password" required
               class="w-full px-3 py-2 bg-[var(--color-bg-900)] border border-[var(--color-border)] rounded-lg focus:outline-none focus:border-[var(--color-cyber)]">
      </div>

      <div class="text-center">
        <button type="submit"
                class="px-6 py-2 bg-[var(--color-cyber)] text-black font-semibold rounded-lg hover:brightness-110 transition-all">
          Login
        </button>
      </div>
    </form>

    <div class="mt-6 border-t border-[var(--color-border)] pt-4">
      <button type="button"
              onclick="toggleCreateAccount()"
              class="w-full text-sm text-warning hover:underline">
        Create account
      </button>

      <div id="createAccountBox" class="hidden mt-4">
        <form method="POST" action="{{ url_for('register') }}" class="space-y-4">

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-[var(--color-muted)] mb-2">First Name</label>
              <input type="text" name="firstName" required
                     class="w-full px-3 py-2 bg-[var(--color-bg-900)] border border-[var(--color-border)] rounded-lg focus:outline-none focus:border-[var(--color-cyber)]">
            </div>
            <div>
              <label class="block text-sm font-medium text-[var(--color-muted)] mb-2">Last Name</label>
              <input type="text" name="lastName" required
                     class="w-full px-3 py-2 bg-[var(--color-bg-900)] border border-[var(--color-border)] rounded-lg focus:outline-none focus:border-[var(--color-cyber)]">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-[var(--color-muted)] mb-2">Email</label>
            <input type="email" name="userEmail" required
                   class="w-full px-3 py-2 bg-[var(--color-bg-900)] border border-[var(--color-border)] rounded-lg focus:outline-none focus:border-[var(--color-cyber)]">
          </div>

          <div>
            <label class="block text-sm font-medium text-[var(--color-muted)] mb-2">Phone Number</label>
            <input type="text" name="userPhoneNo" required
                   class="w-full px-3 py-2 bg-[var(--color-bg-900)] border border-[var(--color-border)] rounded-lg focus:outline-none focus:border-[var(--color-cyber)]">
          </div>

          <div>
            <label class="block text-sm font-medium text-[var(--color-muted)] mb-2">Password</label>
            <input type="password" name="userPassword" required
                   class="w-full px-3 py-2 bg-[var(--color-bg-900)] border border-[var(--color-border)] rounded-lg focus:outline-none focus:border-[var(--color-cyber)]">
          </div>

          <div>
            <label class="block text-sm font-medium text-[var(--color-muted)] mb-2">Role</label>
            <select name="role" id="roleSelect" required onchange="toggleRoleFields()"
                    class="w-full px-3 py-2 bg-[var(--color-bg-900)] border border-[var(--color-border)] rounded-lg focus:outline-none focus:border-[var(--color-cyber)]">
              <option value="">Select role</option>
              <option value="reviewer">Reviewer</option>
              <option value="responder">Responder</option>
              <option value="facility_staff">Facility Staff</option>
            </select>
          </div>

          <div id="organizationBox" class="hidden">
            <label class="block text-sm font-medium text-[var(--color-muted)] mb-2">Organization</label>
            <select name="orgID"
                    class="w-full px-3 py-2 bg-[var(--color-bg-900)] border border-[var(--color-border)] rounded-lg focus:outline-none focus:border-[var(--color-cyber)]">
              <option value="">Select organization</option>
              {% for org in organizations %}
              <option value="{{ org.orgID }}">{{ org.orgName }}</option>
              {% endfor %}
            </select>
          </div>

          <div id="facilityBox" class="hidden">
            <label class="block text-sm font-medium text-[var(--color-muted)] mb-2">Facility</label>
            <select name="facilityID"
                    class="w-full px-3 py-2 bg-[var(--color-bg-900)] border border-[var(--color-border)] rounded-lg focus:outline-none focus:border-[var(--color-cyber)]">
              <option value="">Select facility</option>
              {% for facility in facilities %}
              <option value="{{ facility.facilityID }}">{{ facility.facilityName }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="text-center pt-2">
            <button type="submit"
                    class="px-6 py-2 bg-[var(--color-success)] text-black font-semibold rounded-lg hover:brightness-110 transition-all">
              Create Account
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  function toggleCreateAccount() {
    document.getElementById("createAccountBox").classList.toggle("hidden");
  }

  function toggleRoleFields() {
    const role = document.getElementById("roleSelect").value;
    const organizationBox = document.getElementById("organizationBox");
    const facilityBox = document.getElementById("facilityBox");

    organizationBox.classList.add("hidden");
    facilityBox.classList.add("hidden");

    if (role === "responder") {
      organizationBox.classList.remove("hidden");
    } else if (role === "facility_staff") {
      facilityBox.classList.remove("hidden");
    }
  }
</script>
{% endblock %}
